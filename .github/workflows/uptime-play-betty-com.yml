name: play.betty.com Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    retention-days: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check website and decide whether to alert
        id: monitor
        shell: bash
        env:
          URL: https://play.betty.com
        run: |
          STATE_FILE=".github/monitor-state-play-betty-com.json"
          NOW=$(date +%s)

          if [ -f "$STATE_FILE" ]; then
            FIRST_DOWN_AT=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('first_down_at',''))")
            LAST_ALERT_AT=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('last_alert_at',''))")
            STATUS_STATE=$(python3 -c "import json; d=json.load(open('$STATE_FILE')); print(d.get('status','up'))")
          else
            FIRST_DOWN_AT=""
            LAST_ALERT_AT=""
            STATUS_STATE="up"
          fi

          HTTP_STATUS=$(curl -L -s -o /tmp/site.html -w "%{http_code}" --max-time 20 "$URL" || echo "000")

          echo "HTTP status: $HTTP_STATUS"
          echo "Previous state: $STATUS_STATE"

          SEND_ALERT=false
          ALERT_TEXT=""

          if [ "$HTTP_STATUS" = "200" ]; then
            if [ "$STATUS_STATE" = "down" ] && [ -n "$FIRST_DOWN_AT" ]; then
              DOWN_FOR=$((NOW - FIRST_DOWN_AT))
              MINUTES_DOWN=$((DOWN_FOR / 60))

              SEND_ALERT=true
              ALERT_TEXT="â play.betty.com BACK UP
          URL: $URL
          Status: $HTTP_STATUS
          Downtime: ${MINUTES_DOWN} minutes"
            fi

            mkdir -p .github
            cat > "$STATE_FILE" <<EOF
          {"status":"up","first_down_at":"","last_alert_at":""}
          EOF

            {
              echo "send_alert=$SEND_ALERT"
              echo "site_status=up"
              echo "http_status=$HTTP_STATUS"
              echo "alert_text<<EOF"
              echo "$ALERT_TEXT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            exit 0
          fi

          if [ "$STATUS_STATE" != "down" ] || [ -z "$FIRST_DOWN_AT" ]; then
            FIRST_DOWN_AT="$NOW"
            LAST_ALERT_AT="$NOW"
            SEND_ALERT=true
            ALERT_TEXT="ðš play.betty.com DOWN
          URL: $URL
          Status: $HTTP_STATUS"
          else
            DOWN_FOR=$((NOW - FIRST_DOWN_AT))
            SINCE_LAST_ALERT=$((NOW - LAST_ALERT_AT))

            if [ "$DOWN_FOR" -ge 600 ] && [ "$SINCE_LAST_ALERT" -ge 600 ]; then
              LAST_ALERT_AT="$NOW"
              SEND_ALERT=true
              MINUTES_DOWN=$((DOWN_FOR / 60))
              ALERT_TEXT="ðš play.betty.com STILL DOWN
          URL: $URL
          Status: $HTTP_STATUS
          Down for: ${MINUTES_DOWN} minutes"
            fi
          fi

          mkdir -p .github
          cat > "$STATE_FILE" <<EOF
          {"status":"down","first_down_at":"$FIRST_DOWN_AT","last_alert_at":"$LAST_ALERT_AT"}
          EOF

          {
            echo "send_alert=$SEND_ALERT"
            echo "site_status=down"
            echo "http_status=$HTTP_STATUS"
            echo "alert_text<<EOF"
            echo "$ALERT_TEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Send Telegram alert
        if: steps.monitor.outputs.send_alert == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG='${{ steps.monitor.outputs.alert_text }}'

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=$MSG"

      - name: Send Slack alert
        if: steps.monitor.outputs.send_alert == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG='${{ steps.monitor.outputs.alert_text }}'
          payload=$(jq -n --arg text "$MSG" '{text: $text}')

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Save updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/monitor-state-play-betty-com.json
          git diff --cached --quiet || git commit -m "Update play.betty.com monitor state"
          git push
